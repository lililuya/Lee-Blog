name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/scholar-blog-studio

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            mkdir -p /srv/scholar-blog-studio
            cd /srv/scholar-blog-studio
            cat > .env <<'EOF'
            ${{ secrets.APP_ENV_FILE }}
            EOF
            if [ ! -f docker-compose.prod.yml ]; then
              echo "Please upload docker-compose.prod.yml to /srv/scholar-blog-studio before the first deployment."
              exit 1
            fi
            export APP_IMAGE=${{ env.IMAGE_NAME }}:latest
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_PAT }}
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d db
            docker compose -f docker-compose.prod.yml run --rm app npm run db:push
            docker compose -f docker-compose.prod.yml run --rm app npm run db:seed
            docker compose -f docker-compose.prod.yml up -d app
            docker image prune -f