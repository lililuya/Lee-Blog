name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/scholar_blog?schema=public
      APP_URL: http://localhost:3000
      SESSION_SECRET: ci-test-secret-please-change
      CHAT_ALLOW_GUEST: false
      ADMIN_NAME: CI Admin
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ChangeMe123!
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: scholar_blog
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d scholar_blog"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Push database schema
        run: npm run db:push

      - name: Bootstrap database
        run: npm run db:bootstrap

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
