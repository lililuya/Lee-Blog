<svg width="1280" height="860" viewBox="0 0 1280 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="140" y1="70" x2="1140" y2="790" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF7F0"/>
      <stop offset="1" stop-color="#F1EBE0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FCFAF5"/>
      <stop offset="1" stop-color="#F5EEE3"/>
    </linearGradient>
    <linearGradient id="panelStrong" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#EAF4EF"/>
      <stop offset="1" stop-color="#DEEDE5"/>
    </linearGradient>
    <linearGradient id="panelGold" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F6EBD8"/>
      <stop offset="1" stop-color="#EFDFC4"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="1320" height="900" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#14212B" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 36px "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif; fill: #14212B; }
      .subtitle { font: 500 18px "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif; fill: #50616C; }
      .section { font: 700 24px "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif; fill: #14212B; }
      .body { font: 500 17px "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif; fill: #31424D; }
      .small { font: 600 14px "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif; fill: #50616C; letter-spacing: 1px; }
      .chip { font: 700 13px "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif; fill: #10453F; }
      .arrow { stroke: #6E8F88; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <g filter="url(#shadow)">
    <rect x="40" y="30" width="1200" height="790" rx="34" fill="url(#bg)" />
  </g>

  <text x="86" y="95" class="title">博客系统技术架构图</text>
  <text x="86" y="128" class="subtitle">围绕前台发布、后台管理、研究工作流、AI 工具与数据层构成的一体化站点系统</text>

  <rect x="86" y="176" width="320" height="190" rx="24" fill="url(#panelStrong)" stroke="#8CB2A6" stroke-width="2"/>
  <text x="114" y="222" class="small">前台访问层</text>
  <text x="114" y="260" class="section">公开页面与阅读入口</text>
  <text x="114" y="302" class="body">• 首页、博客、笔记、周报、论文页</text>
  <text x="114" y="336" class="body">• 分类、标签、归档、搜索</text>
  <text x="114" y="370" class="body">• 评论区、轮播、主题切换</text>

  <rect x="454" y="176" width="372" height="190" rx="24" fill="url(#panel)" stroke="#9AB2AA" stroke-width="2"/>
  <text x="482" y="222" class="small">应用与业务层</text>
  <text x="482" y="260" class="section">Next.js 页面 / API / Server Actions</text>
  <text x="482" y="302" class="body">• 内容查询、聚合、权限判断</text>
  <text x="482" y="336" class="body">• 评论审核、后台表单、请求调试</text>
  <text x="482" y="370" class="body">• RAG、论文同步、周报生成入口</text>

  <rect x="874" y="176" width="280" height="190" rx="24" fill="url(#panelGold)" stroke="#C8AC76" stroke-width="2"/>
  <text x="902" y="222" class="small">后台工作台</text>
  <text x="902" y="260" class="section">管理后台</text>
  <text x="902" y="302" class="body">• 内容管理</text>
  <text x="902" y="336" class="body">• 评论审核与规则</text>
  <text x="902" y="370" class="body">• Provider / RAG / 统计</text>

  <path d="M406 270H446" class="arrow"/>
  <path d="M826 270H866" class="arrow"/>
  <path d="M858 262L874 270L858 278" class="arrow"/>
  <path d="M430 540H840" class="arrow"/>
  <path d="M832 532L848 540L832 548" class="arrow"/>

  <rect x="180" y="438" width="920" height="210" rx="28" fill="#FCFAF5" stroke="#B8C8C0" stroke-width="2"/>
  <text x="214" y="484" class="small">数据与能力中枢</text>
  <text x="214" y="522" class="section">Prisma + PostgreSQL + 内容模型</text>
  <text x="214" y="564" class="body">• Post / Note / Journal / Digest / Gallery / Series</text>
  <text x="214" y="598" class="body">• User / Session / 2FA / Comment / Notification / Audit</text>
  <text x="214" y="632" class="body">• PaperTopic / DailyPaperEntry / PaperLibrary / Annotation / RagKnowledgeChunk</text>

  <rect x="86" y="700" width="330" height="90" rx="22" fill="#EDF5F2" stroke="#9ABEB3" stroke-width="2"/>
  <text x="116" y="740" class="small">内容输入链路</text>
  <text x="116" y="772" class="body">Markdown 内容同步 / 后台在线编辑</text>

  <rect x="474" y="700" width="330" height="90" rx="22" fill="#F5EEE3" stroke="#C9B38A" stroke-width="2"/>
  <text x="504" y="740" class="small">研究工作流</text>
  <text x="504" y="772" class="body">论文同步 / 私有论文库 / 周报生成</text>

  <rect x="862" y="700" width="292" height="90" rx="22" fill="#E9F1F4" stroke="#A6BBC5" stroke-width="2"/>
  <text x="892" y="740" class="small">外部服务</text>
  <text x="892" y="772" class="body">LLM Provider / SMTP / arXiv / 部署任务</text>

  <path d="M250 648V692" class="arrow"/>
  <path d="M640 648V692" class="arrow"/>
  <path d="M1008 648V692" class="arrow"/>

  <rect x="930" y="86" width="224" height="52" rx="26" fill="#E2F0EA" stroke="#8CB2A6" />
  <text x="958" y="118" class="chip">单仓库、一体化全栈架构</text>
</svg>
