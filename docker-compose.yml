services:
  db:
    image: postgres:17-alpine
    container_name: scholar-blog-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scholar_blog}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-scholar_blog}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scholar-blog-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/scholar_blog?schema=public}
      APP_URL: ${APP_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:-replace-this-secret}
      CHAT_ALLOW_GUEST: ${CHAT_ALLOW_GUEST:-false}
      ADMIN_NAME: ${ADMIN_NAME:-Site Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "3000:3000"

volumes:
  postgres_data: